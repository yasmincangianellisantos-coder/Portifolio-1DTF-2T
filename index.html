<!DOCTYPE html> <!-- O Doctype indica qual a linguagem de programação que está sendo usada, nesse caso, o HTML. -->
<html lang="pt-br"> <!--início do código-->
<head> <!--início do cabeçalho do documento. Dentro dessa tag pode ser inseridas folhas de estilo e scripts. Os itens inseridos aqui não aparecem no navegador.-->
    <meta charset="UTF-8"> <!-- indica quais serão os caracteres (character set ou charset) será utilizado para renderizar o texto da página. O UTF-8 identifica os caracteres da língua portuguesa.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

</body>
</html>
